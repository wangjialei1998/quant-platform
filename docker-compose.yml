services:
  postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - path: .env
        required: false
    ports:
      - "18000:8000"
    volumes:
      - ./backend:/app
      - strategy_storage:/app/storage/strategies
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO --queues=strategy,backtest,monitor,market_data,notification,chart
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend:/app
      - strategy_storage:/app/storage/strategies
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - api
      - redis

  beat:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - worker

  strategy-sandbox:
    build:
      context: ./backend
    image: quant-platform-strategy-sandbox:latest
    command: python -c "print('strategy sandbox image ready')"
    profiles:
      - tools

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    ports:
      - "15173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  strategy_storage:
  frontend_node_modules:
